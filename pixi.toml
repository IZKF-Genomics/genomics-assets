[workspace]
name = "genomics-assets"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[dependencies]
python = ">=3.10"
pyyaml = "*"
star = "*"
bowtie2 = "*"
bwa = "*"
hisat2 = "*"
salmon = "*"
kallisto = "*"
kraken2 = "*"
bracken = "*"

[tasks]
test = "python -m pytest -q"

